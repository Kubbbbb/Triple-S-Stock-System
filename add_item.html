            <!DOCTYPE html>

<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item - Triple S+</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
        <form id="addForm">
            <div id="form-fields" class="grid-fields"></div>
            
            <div class="form-actions">
                <button type="submit" class="btn-save" id="submitBtn">
                    <i data-lucide="save"></i> บันทึกข้อมูลรายการ
                </button>
            </div>
        </form>
    </div>
</div>

    <script>
        const SUPABASE_URL = 'https://gewmcomtwmjsdduygjxz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdld21jb210d21qc2RkdXlnanh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTc2NTUsImV4cCI6MjA5MDUzMzY1NX0.jS9Jr86-jNG7EltnA1HenSiTXhppw4FG2tGffSZ66RU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const currentTab = urlParams.get('tab') || 'floor2';

        const fieldsConfig = {
            floor2: [
                { label: 'ประเภท (Type)', id: 'type', type: 'text' },
                { label: 'ชื่อรายการ (Item)', id: 'item', type: 'text' },
                { label: 'หน่วย (Unit)', id: 'unit', type: 'text' },
                { label: 'จำนวน (QTY)', id: 'qty', type: 'number' },
                { label: 'ราคาต่อหน่วย (Price)', id: 'price', type: 'number' },
                { label: 'ราคารวม (Amount)', id: 'amount', type: 'number', readonly: true, required: false },
                { label: 'วันที่ (Date)', id: 'date', type: 'date', value: new Date().toISOString().split('T')[0] }
            ],
            floor3: [
                { label: 'Brand', id: 'brand', type: 'text' },
                { label: 'Code', id: 'code', type: 'text' },
                { label: 'Type', id: 'type', type: 'text' },
                { label: 'Name', id: 'name', type: 'text' },
                { label: 'Color', id: 'color', type: 'text' },
                { label: 'QTY', id: 'qty', type: 'number' },
                { label: 'Price', id: 'price', type: 'number' }
            ],
            old_stock: [
                { label: 'Type', id: 'type', type: 'text' },
                { label: 'Name/Detail', id: 'name_detail', type: 'text' },
                { label: 'Incoming Date', id: 'incoming_date', type: 'date' },
                { label: 'Remaining', id: 'remaining', type: 'number' },
                { label: 'Location', id: 'location', type: 'text' }
            ]
        };

        window.onload = () => {
            lucide.createIcons();

            const titleMap = {
                floor2: "Floor 2",
                floor3: "Floor 3",
                old_stock: "Old Stock"
            };

            document.getElementById('form-title').innerText =
                `เพิ่มข้อมูลลงใน ${titleMap[currentTab]}`;

            const container = document.getElementById('form-fields');
            const fields = fieldsConfig[currentTab];

            fields.forEach(f => {
                const div = document.createElement('div');
                div.className = 'form-group';

                div.innerHTML = `
                    <label>${f.label}</label>
                    <input 
                        type="${f.type}" 
                        id="${f.id}"
                        ${f.readonly ? 'readonly style="background:#f1f5f9;cursor:not-allowed;"' : ''}
                        ${f.value ? `value="${f.value}"` : ''}
                        ${f.required === false ? '' : 'required'}
                    >
                `;

                container.appendChild(div);
            });

            // ✅ Auto calculate (เฉพาะ floor2)
            if (currentTab === 'floor2') {
                const qty = document.getElementById('qty');
                const price = document.getElementById('price');
                const amount = document.getElementById('amount');

                const calc = () => {
                    const q = parseFloat(qty.value) || 0;
                    const p = parseFloat(price.value) || 0;
                    amount.value = (q * p).toFixed(2);
                };

                qty.oninput = calc;
                price.oninput = calc;
            }
        };

        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.innerText = "กำลังบันทึก...";
            btn.disabled = true;

            const fields = fieldsConfig[currentTab];
            const payload = {};

            fields.forEach(f => {
                if (f.id === 'amount') return; // 🚨 สำคัญมาก

                const val = document.getElementById(f.id).value;

                payload[f.id] =
                    (f.type === 'number') ? parseFloat(val) || 0 : val;
            });

            const { error } = await supabaseClient
                .from(currentTab)
                .insert([payload]);

            if (error) {
                alert("❌ " + error.message);
                btn.innerHTML = '<i data-lucide="save"></i> บันทึกข้อมูลรายการ';
                btn.disabled = false;
                lucide.createIcons();
            } else {
                alert("บันทึกสำเร็จ");
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
