<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple S+ Stock System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Check Auth ก่อนโหลดหน้า
        (async () => {
            const SUPABASE_URL = 'https://gewmcomtwmjsdduygjxz.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdld21jb210d21qc2RkdXlnanh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTc2NTUsImV4cCI6MjA5MDUzMzY1NX0.jS9Jr86-jNG7EltnA1HenSiTXhppw4FG2tGffSZ66RU';
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data } = await supabaseClient.auth.getSession();
            if (!data.session) window.location.href = 'login.html';
        })();
    </script>
</head>

<body>
<div class="app-container">

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="package"></i>
                    <span>TRIPLE S+ <br>
                    Stock System</span>
                </div>
            </div>

            <nav class="menu">
                <button class="menu-item active" onclick="switchTab(event,'floor2')">
                    <i data-lucide="layers"></i> Floor 2
                </button>
                <button class="menu-item" onclick="switchTab(event,'floor3')">
                    <i data-lucide="layers"></i> Floor 3
                </button>
                <button class="menu-item" onclick="switchTab(event,'old_stock')">
                    <i data-lucide="archive"></i> Old Stock
                </button>
            </nav>
        </div>

        <div class="sidebar-footer">
            <button class="menu-item logout-btn" onclick="logout()">
                <i data-lucide="log-out"></i> Logout
            </button>
        </div>
    </aside>

    <!-- ค้นหาส่วน <main class="main-content"> ใน index.html แล้วเพิ่มส่วน search-container ลงไป -->
<main class="main-content">
    <header class="top-bar">
        <div>
            <h2 id="title">Floor 2</h2>
            <div class="user-info">Inventory Management System</div>
        </div>
    </header>

    
    <!-- แทนที่ส่วน search-container เดิมใน index.html -->
    <div class="search-container">
        <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาข้อมูลในตาราง..." oninput="handleSearch()">
        </div>
        
        <!-- กลุ่มปุ่มจัดการ (ชิดขวา) -->
        <div class="search-actions">
            <button class="btn-edit-mode" onclick="toggleEditMode()">
                <i data-lucide="edit-3"></i> แก้ไขรายการ
            </button>
            <button class="btn-add" onclick="goToAddPage()">
                <i data-lucide="plus-circle"></i> เพิ่มรายการ
            </button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</main>
</div>


<!-- Modal สำหรับแก้ไขข้อมูล -->
<div id="editModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i data-lucide="edit-3"></i> แก้ไขข้อมูลรายการ</h3>
            <button class="btn-close" onclick="closeEditModal()">&times;</button>
        </div>
        <form id="editForm">
            <div id="modal-fields" class="grid-fields">
                <!-- Fields จะถูกสร้างอัตโนมัติด้วย JS -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeEditModal()">ยกเลิก</button>
                <button type="submit" class="btn-save-confirm" id="btnSaveModal">บันทึกการเปลี่ยนแปลง</button>
            </div>
        </form>
    </div>
</div>


<script src="script.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
