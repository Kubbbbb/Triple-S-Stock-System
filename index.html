<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple S+ Stock System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Check Auth ก่อนโหลดหน้า
        (async () => {
            const SUPABASE_URL = 'https://gewmcomtwmjsdduygjxz.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdld21jb210d21qc2RkdXlnanh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTc2NTUsImV4cCI6MjA5MDUzMzY1NX0.jS9Jr86-jNG7EltnA1HenSiTXhppw4FG2tGffSZ66RU';
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data } = await supabaseClient.auth.getSession();
            if (!data.session) window.location.href = 'login.html';
        })();
    </script>
</head>

<body>
<div class="app-container">
    <!-- Overlay for mobile (single instance) -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="package"></i>
                    <span>TRIPLE S+ <br> Stock System</span>
                </div>
                <button class="btn-close-sidebar" onclick="toggleSidebar()">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <nav class="menu">
                <button class="menu-item active" onclick="switchTab(event,'floor2')">
                    <i data-lucide="layers"></i> Floor 2
                </button>
                <button class="menu-item" onclick="switchTab(event,'floor3')">
                    <i data-lucide="layers"></i> Floor 3
                </button>
                <button class="menu-item" onclick="switchTab(event,'old_stock')">
                    <i data-lucide="archive"></i> Old Stock
                </button>
                <button class="menu-item" onclick="switchTab(event,'scanner')">
                    <i data-lucide="scan"></i> Scanner
                </button>
            </nav>
        </div>
        
        
        <!-- ค้นหาไฟล์ index.html ส่วน sidebar-footer -->
        <div class="sidebar-footer">
            <div class="user-profile-bar">
                <!-- กล่องวงกลมที่มี Overlay ซ่อนอยู่ -->
                <div class="avatar-container" onclick="document.getElementById('profileInput').click()">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar">
                    <div class="avatar-upload-overlay">
                        <i data-lucide="camera"></i>
                    </div>
                </div>
                
                <div class="user-info-text">
                    <span id="userEmail">loading...</span>
                </div>
            </div>
            
            <!-- Input สำหรับเลือกไฟล์ -->
            <input type="file" id="profileInput" hidden accept="image/*" onchange="uploadAvatar(this)">

            <button class="menu-item logout-btn" onclick="logout()">
                <i data-lucide="log-out"></i> Logout
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="top-bar-left" style="display: flex; align-items: center; gap: 12px; flex: 1;">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <div>
                    <h2 id="title">Floor 2</h2>
                    <div class="user-info">Inventory Management System</div>
                </div>
            </div>
        </header>
    
    <!-- แทนที่ส่วน search-container เดิมใน index.html -->
    <div class="search-container">
        <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาข้อมูลในคลัง..." oninput="handleSearch()">
        </div>
        
        <!-- กลุ่มปุ่มจัดการ (ชิดขวา) -->
        <div class="search-actions">
            <button class="btn-edit-mode" onclick="toggleEditMode()">
                <i data-lucide="edit-3"></i> แก้ไขรายการ
            </button>

            <!-- ค้นหาปุ่ม btn-add เดิมแล้วแก้ onclick -->
            <button class="btn-add" onclick="openAddModal()">
                <i data-lucide="plus-circle"></i> เพิ่มรายการ
            </button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

   <!-- ค้นหา <div id="scanner-section"> ใน index.html แล้วอัปเดตตามนี้ -->
<div id="scanner-section" style="display: none;">
    <div class="scanner-controls-container">
        <!-- 1. เลือกตาราง (Table Selector เดิม) -->
        <div class="scanner-control-group">
            <label><i data-lucide="database"></i> ตารางเป้าหมาย (กรณีเพิ่มใหม่):</label>
            <div class="table-options">
                <button class="tab-select active" onclick="setScanTarget('floor2', this)">Floor 2</button>
                <button class="tab-select" onclick="setScanTarget('floor3', this)">Floor 3</button>
                <button class="tab-select" onclick="setScanTarget('old_stock', this)">Old Stock</button>
            </div>
        </div>

        <!-- 2. เลือกโหมด เพิ่ม/ลด (Operation Selector ใหม่) -->
        <div class="scanner-control-group">
            <label><i data-lucide="settings-2"></i> โหมดการสแกน:</label>
            <div class="operation-options">
                <button class="op-select active plus" onclick="setScanOperation('plus', this)">
                    <i data-lucide="plus-circle"></i> เพิ่มจำนวน (+1)
                </button>
                <button class="op-select minus" onclick="setScanOperation('minus', this)">
                    <i data-lucide="minus-circle"></i> ลดจำนวน (-1)
                </button>
            </div>
        </div>
    </div>
    
    <!-- ส่วน scanner-container ด้านล่างยังคงเหมือนเดิม -->
    <div class="scanner-container">
        <!-- ฝั่งซ้าย: กล้องสแกน (คงเดิม) -->
        <div class="scanner-view-side">
            <div class="scanner-card">
                <div class="scanner-header">
                    <h3><i data-lucide="scan-line"></i> เครื่องสแกนบาร์โค้ด</h3>
                </div>
                <div id="reader-wrapper">
                    <div id="reader"></div>
                </div>
                <p class="scanner-tip">สแกนเพื่อค้นหาข้อมูลในตารางที่เลือก</p>
            </div>
        </div>

        <!-- ฝั่งขวา: แสดงผล (คงเดิม) -->
        <div class="scanner-result-side">
            <div id="scan-placeholder" class="placeholder-content">
                <i data-lucide="package-search" size="48"></i>
                <p>รอผลการสแกนข้อมูล...</p>
            </div>

            <div id="scan-result-card" class="result-card" style="display: none;">
                <div class="result-header">
                    <span id="res-tab-label" class="badge">Floor 2</span>
                    <h3 id="res-title">ชื่อสินค้า</h3>
                </div>
                <div id="res-details-list" class="res-details-grid"></div>
                <div class="result-actions">
                    <button class="btn-edit-mode" id="btn-go-detail">
                        <i data-lucide="external-link"></i> ดูรายละเอียดเต็ม
                    </button>
                    <button class="btn-cancel" onclick="scanAgain()">
                        <i data-lucide="refresh-cw"></i> ลองสแกนใหม่
                    </button>
                </div>
            </div>
        </div>
    </div>
</div><!-- /#scanner-section -->
</main>



<!-- Modal สำหรับแก้ไขข้อมูล -->
<div id="editModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i data-lucide="edit-3"></i> แก้ไขข้อมูลรายการ</h3>
            <button class="btn-close" onclick="closeEditModal()">&times;</button>
        </div>
        <form id="editForm">
            <div id="modal-fields" class="grid-fields">
                <!-- Fields จะถูกสร้างอัตโนมัติด้วย JS -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeEditModal()">ยกเลิก</button>
                <button type="submit" class="btn-save-confirm" id="btnSaveModal">บันทึกการเปลี่ยนแปลง</button>
            </div>
        </form>
    </div>
</div>

<!-- เพิ่ม Modal สำหรับเพิ่มข้อมูล (ต่อจาก editModal) -->
<div id="addModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i data-lucide="plus-circle"></i> <span id="add-modal-title">เพิ่มรายการใหม่</span></h3>
            <button class="btn-close" onclick="closeAddModal()">&times;</button>
        </div>
        <form id="addForm">
            <div id="add-modal-fields" class="grid-fields">
                <!-- Fields จะถูกสร้างอัตโนมัติด้วย JS -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeAddModal()">ยกเลิก</button>
                <button type="submit" class="btn-save" id="btnSaveAdd">บันทึกข้อมูลรายการ</button>
            </div>
        </form>
    </div>
</div>


<script src="script.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
